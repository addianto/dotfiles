---
name: OpenAI
version: 1.0.0
schema: v1

models:
  - name: GPT-5.2 Codex
    provider: openai
    model: gpt-5.2-codex
    apiKey: ${{ secrets.OPENAI_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 400000
      maxTokens: 128000
  - name: GPT-5.1 Codex
    provider: openai
    model: gpt-5.1-codex
    apiKey: ${{ secrets.OPENAI_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 400000
      maxTokens: 128000
  - name: GPT-5 Mini
    provider: openai
    model: gpt-5-mini
    apiKey: ${{ secrets.OPENAI_API_KEY }}
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      contextLength: 400000
      maxTokens: 128000
