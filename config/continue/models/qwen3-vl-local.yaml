%YAML 1.1
---
name: Qwen 3 VL 4B
version: 1.0.1
schema: v1
model_defaults: &model_defaults
  provider: openai
  apiBase: http://localhost:2276/v1
  capabilities:
    - tool_use
    - image_input

models:
  - name: Qwen 3 VL 4B (Instruct)
    model: qwen3-vl-4b
    <<: *model_defaults
    # Based on https://unsloth.ai/docs/models/qwen3-how-to-run-and-fine-tune/qwen3-vl-how-to-run-and-fine-tune#recommended-settings
    defaultCompletionOptions:
      temperature: 0.7
      top_p: 0.8
      top_k: 20

  - name: Qwen 3 VL 4B (Thinking)
    model: qwen3-vl-4b-thinking
    <<: *model_defaults
    # Based on https://unsloth.ai/docs/models/qwen3-how-to-run-and-fine-tune/qwen3-vl-how-to-run-and-fine-tune#recommended-settings
    defaultCompletionOptions:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      reasoning: true
