---
name: Default
version: 1.1.0
schema: v1

mcpServers:
  - name: Context7
    command: pnpm
    args:
      - "dlx"
      - "@upstash/context7-mcp@2.1.2"
  - name: Sequential Thinking
    command: pnpm
    args:
      - "dlx"
      - "@modelcontextprotocol/server-sequential-thinking@2025.12.18"
  - name: Time
    command: uvx
    args:
      - "mcp-server-time==2026.1.26"
  - name: Git
    command: uvx
    args:
      - "mcp-server-git==2026.1.14"
  - name: GitHub
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote@0.1.38"
      - "https://api.githubcopilot.com/mcp/"
      - "--header"
      - "Authorization: Bearer ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}"
    env:
      GITHUB_TOOLSETS: "default,code_security,secret_protection,security_advisories"
      GITHUB_LOCKDOWN_MODE: "1"
  - name: GitLab
    command: pnpm
    args:
      - "dlx"
      - "@zereight/mcp-gitlab@2.1.0"
    env:
      GITLAB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITLAB_PERSONAL_ACCESS_TOKEN }}
      GITLAB_API_URL: "https://gitlab.com/api/v4"
      GITLAB_DENIED_TOOLS_REGEX: "(label|labels|release|releases|release_evidence|release_asset|namespace|namespaces)$"
      USE_GITLAB_WIKI: "false"
      USE_PIPELINE: "false"
      USE_MILESTONE: "true"
  - name: Mermaid
    type: streamable-http
    url: https://mcp.mermaidchart.com/mcp
  - name: Microsoft Learn
    type: streamable-http
    url: https://learn.microsoft.com/api/mcp

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: tree
    params:
      nRetrieve: 25
      nFinal: 5
      useReranking: true
  - provider: docs
    params:
      nRetrieve: 25
      nFinal: 5
      useReranking: true
