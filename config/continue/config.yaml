---
name: Default
version: 1.0.0
schema: v1

models:
  - uses: mistral/codestral
    with:
      MISTRAL_API_KEY: ${{ secrets.CODESTRAL_API_KEY }}
    override:
      model: codestral-2508
      defaultCompletionOptions:
        contextLength: 128000

  - uses: mistral/mistral-large
    with:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
    override:
      model: mistral-large-2512
      defaultCompletionOptions:
        contextLength: 256000
      capabilities:
        - tool_use
        - image_input

  - uses: mistral/devstral-medium
    with:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
    override:
      model: devstral-medium-2507
      defaultCompletionOptions:
        contextLength: 128000

  - name: Magistral Medium 1.2
    provider: mistral
    model: magistral-medium-2509
    apiKey: ${{ secrets.MISTRAL_API_KEY }}
    roles:
      - chat
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      temperature: 0.7
      top_p: 0.95

  - uses: openai/gpt-4.1
    with:
      # Use API key from GitHub Copilot
      # Refer to https://aider.chat/docs/llms/github.html
      OPENAI_API_KEY: ${{ secrets.GITHUB_COPILOT_API_KEY }}
    override:
      name: GPT 4.1 (via GitHub Copilot)
      apiBase: https://api.githubcopilot.com
      model: gpt-4.1

mcpServers:
  - name: Context7
    command: pnpm
    args:
      - "dlx"
      - "@upstash/context7-mcp@1.0.32"

  - name: Sequential Thinking
    command: pnpm
    args:
      - "dlx"
      - "@modelcontextprotocol/server-sequential-thinking@2025.12.18"

  - name: Time
    command: uvx
    args:
      - "mcp-server-time==2025.9.25"

  - name: Git
    command: uvx
    args:
      - "mcp-server-git==2025.11.25"

  - name: GitHub
    command: pnpm
    args:
      - "dlx"
      - "mcp-remote@0.1.38"
      - "https://api.githubcopilot.com/mcp/"
      - "--header"
      - "Authorization: Bearer ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}"
    env:
      GITHUB_TOOLSETS: "default,code_security,secret_protection,security_advisories"
      GITHUB_LOCKDOWN_MODE: "1"

  - name: Mermaid
    type: streamable-http
    url: https://mcp.mermaidchart.com/mcp

  - name: Microsoft Learn
    type: streamable-http
    url: https://learn.microsoft.com/api/mcp

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: tree
    params:
      nRetrieve: 25
      nFinal: 5
      useReranking: true
  - provider: docs
    params:
      nRetrieve: 25
      nFinal: 5
      useReranking: true
